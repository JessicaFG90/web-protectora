    <div class="FormularioContacto">
        <h1>Formulario de Contacto</h1>
        <p class="Subtexto">Rellena el formulario y nos pondremos en contacto contigo.</p>
        
        <form action="/enviar-formulario.php" method="post">
            <div class="DetalleFormulario">
                <label for="nombre">Nombre completo <span class="Requerido">*</span></label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="DetalleFormulario">
                <label for="email">Email <span class="Requerido">*</span></label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="DetalleFormulario">
                <label for="telefono">Teléfono <span class="Requerido">*</span></label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>

            <div class="DetalleFormulario">
                <label for="motivo">Motivo del contacto <span class="Requerido">*</span></label>
                <select id="motivo" name="motivo" required>
                    <option value="">Selecciona una opción</option>
                    <option value="adoptar">Adoptar</option>
                    <option value="acoger">Acoger</option>
                    <option value="apadrinar">Apadrinar</option>
                    <option value="voluntariado">Voluntariado</option>
                    <option value="otros">Otros</option>
                </select>
            </div>

            <div class="DetalleFormulario">
                <label for="mensaje">Mensaje <span class="Requerido">*</span></label>
                <textarea id="mensaje" placeholder="¡Dinos el nombre del perro o gato que te interese y háblanos un poco de ti en caso que quieras adoptar o acoger!" name="mensaje" required></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>
        </form>
    </div>
